# Rotary Kiln Physical Geometry
kiln:
  length: 60.0         # m
  diameter: 3.5       # m
  slope: 0.03         # m/m
  rpm: 1.5            # 1/min (Dinamik kontrol değişkeni)
  nodes: 100          # dz = 0.6m
  filling_degree: 0.08 # Düşük besleme (10 kg/s) için fiziksel doluluk

# Solid Phase (Limestone/Lime) Properties
material:
  feed_rate: 10.0      # kg/s
  rho_s: 1600.0       # kg/m3
  cp_s: 1100.0        # J/kg.K
  dh_rxn: 1.78e6      # J/kg
  temp_inlet: 300.0   # K
  emissivity_s: 0.85

# Reaction Kinetics (Solver'daki self.kin.dH ve self.kin.compute_rate için)
kinetics:
  k0: 1.2e7           # 1/s
  Ea: 1.8e5           # J/mol
  R: 8.314            # J/mol.K
  T_min_rxn: 1073.0   # K (Kalsinasyon eşiği)
  dH: 1.78e6          # J/kg (Endotermik enerji gereksinimi)

# Gas Phase (Combustion Products)
gas:
  flow_rate: 8.0      # kg/s (10 kg/s feed için dengelenmiş hava akışı)
  temp_inlet: 2000.0  # K (Brülör sıcaklığı)
  cp_g: 1200.0        # J/kg.K
  h_gs: 22.0          # W/m2.K (Isı transfer katsayısı)
  emissivity_g: 0.30  # Gaz yayınımı

# Numerical & Solver Controls
solver:
  dt: 0.1          
  t_final: 108000        # s
  tolerance: 1e-4