# Rotary Kiln Physical Geometry
kiln:
  length: 60.0         # m
  diameter: 3.5       # m
  slope: 0.03         # m/m
  rpm: 1.5            # 1/min
  nodes: 100          # dz = 0.6m
  filling_degree: 0.08 # Düşük feed (10) için fiziksel olarak daha gerçekçi

# Solid Phase (Limestone/Lime) Properties
material:
  feed_rate: 10.0      # kg/s
  rho_s: 1600.0       # kg/m3
  cp_s: 1100.0        # J/kg.K
  dh_rxn: 1.78e6      # J/kg
  temp_inlet: 300.0   # K
  emissivity_s: 0.85

# Reaction Kinetics (Bu bölümün varlığından emin olun)
kinetics:
  k0: 1.2e7           # 1/s
  Ea: 1.8e5           # J/mol
  R: 8.314            # J/mol.K
  T_min_rxn: 1073.0   # K (Kalsinasyon eşiği)
  dH: 1.78e6          # Solver'ın beklediği dH parametresi

# Gas Phase (Combustion Products)
gas:
  # Feed 10 iken 15 kg/s gaz aşırı ısıtmaya sebep olur, 8.0'a çekildi
  flow_rate: 8.0      # kg/s 
  temp_inlet: 1400.0  # K
  cp_g: 1200.0        # J/kg.K
  # Isı transfer katsayısı düşürülerek ısınma eğrisi yumuşatıldı
  h_gs: 35.0          # W/m2.K 
  emissivity_g: 0.25  

# Numerical & Solver Controls
solver:
  dt: 0.02             # Sayısal stabilite için daha küçük zaman adımı
  t_final: 7200        # s
  tolerance: 1e-4