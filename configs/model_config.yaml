# ==========================================================
# FINAL RECOVERY CONFIGURATION
# Goal: Break the 16.28% CaO Stagnation
# ==========================================================

kiln:
  length: 60.0
  diameter: 4.2
  slope: 0.03
  rpm: 2.0
  nodes: 100
  filling_degree: 0.10

material:
  feed_rate: 125.0 # ton/h
  rho_s: 1600.0
  cp_s: 1100.0
  temp_inlet: 300.0
  emissivity_s: 0.85

kinetics:
  # ==========================================================
  # CALCINATION (CaCO3 -> CaO + CO2)
  # ==========================================================
  k0: 3.0e5
  Ea: 1.95e5
  R: 8.314
  T_min_rxn: 1073.0
  dH: 1.78e6

  # ==========================================================
  # BELITE (C2S)
  # 2CaO + SiO2 -> C2S
  # ==========================================================
  k0_c2s: 2.1e5
  Ea_c2s: 2.3e5
  T_min_c2s: 1220.0
  T_opt_c2s: 1350.0
  T_max_c2s: 1500.0
  dH_c2s: -1.10e6

  # ==========================================================
  # ALITE (C3S)
  # CaO + C2S -> C3S
  # ==========================================================
  k0_c3s: 2.3e5
  Ea_c3s: 3.0e5
  T_min_c3s: 1380.0
  T_opt_c3s: 1450.0
  T_max_c3s: 1550.0
  dH_c3s: -6.0e5

  # ==========================================================
  # AUX PHASES
  # ==========================================================
  pre_factor_c3a: 8.0e-4
  pre_factor_c4af: 5.0e-4

  # ==========================================================
  # NUMERICAL / SAFETY
  # ==========================================================
  arrhenius_clip_min: -80.0
  arrhenius_clip_max: 45.0

  max_conversion_per_step: 0.06
  min_species_floor: 1e-12

gas:
  fuel_rate: 11.72 # ton/h       
  fan_rate: 800.0
  nominal_flow: 52.0
  temp_inlet: 1200.0    
  cp_g: 1280.0
  h_gs: 140.0        
  emissivity_g: 0.55
  lhv_fuel: 32000.0

raw_meal_composition:
  
  CaCO3: 0.730           
  SiO2: 0.210            
  Al2O3: 0.040           
  Fe2O3: 0.020           

solver:
  dt: 0.05               
  t_final: 10800
  tolerance: 1e-4