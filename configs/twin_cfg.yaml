plant:
  N: 5
  length: 60.0   # m

transition:
  length: 25.0

calciner:
  length: 25.0

preheater:
  length: 25.0

cooler:
  length: 25.0


simulation:
  dt: 0.05
  total_hours: 2.0
  chunk_hours: 1.0


fuel:
  Fuel_rate_total: 1.5556   # kg/s (converted from t/h if needed)
  Petcoke_ratio: 0.54
  Coal_ratio: 0.30
  RDF_ratio: 0.15
  H2_ratio: 0.01
  O2: 3.5


motion:
  rpm_default: 1.5
  rpm_min: 1.0
  rpm_max: 3.0
  inclination_deg: 3.0


feed:
  Feed_rate_kg_s: 33.3333   # 120000 kg/h clinker feed (SOLID INPUT)


operational:
  kiln_load: 1.0
  availability: 0.95
  bypass_ratio: 0.0
  false_air_ratio: 0.03
  calcination_degree_target: 0.92


logging:
  
  interval_sec: 60      # Temperature & control report interval [s]

checkpoint:
  enabled: true
  file: burning_ckpt.pkl