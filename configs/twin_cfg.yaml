plant:
  N: 5
  length: 60.0

transition:
  length: 25.0

calciner:
  length: 25.0

preheater:
  length: 25.0

cooler:
  length: 25.0
  

simulation:
  
  dt: 0.05 # Plant integration time [s]

  total_hours: 2.0 # Total simulation duration [hours]

  # Optional chunk size for long simulations/checkpoints [hours]
  chunk_hours: 1.0

  
fuel:
  Fuel_rate_total: 5.6 # ton/h
  Petcoke_ratio: 0.54
  Coal_ratio: 0.30
  RDF_ratio: 0.15
  H2_ratio: 0.01
  O2: 3.5

motion:
  rpm_default: 1.5
  rpm_min: 1.0
  rpm_max: 3.0

  inclination_deg: 3.0


logging:
  
  interval_sec: 60      # Temperature & control report interval [s]

checkpoint:
  enabled: true
  file: burning_ckpt.pkl
