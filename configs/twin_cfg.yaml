plant:
  N: 5
  length: 60.0

transition:
  length: 25.0

calciner:
  length: 25.0

preheater:
  length: 25.0

cooler:
  length: 25.0
  

simulation:
  
  dt: 0.05 # Plant integration time [s]

  total_hours: 6.0 # Total simulation duration [hours]

  # Optional chunk size for long simulations/checkpoints [hours]
  chunk_hours: 1.0

logging:
  
  interval_sec: 60      # Temperature & control report interval [s]

checkpoint:
  enabled: true
  file: burning_ckpt.pkl

  
fuel:
  Fuel_rate_total: 3.0
  petcoke_fraction: 0.50
  coal_fraction: 0.30
  rdf_fraction: 0.15
  h2_fraction: 0.05
  oxygen: 3.5

  
  oxygen: 3.5 # Initial combustion conditions

  
  fuel_rate: 5.5 # Initial MPC fuel rate [t/h]