mpc:
  # ======================================================
  # HORIZON SETTINGS
  # ======================================================
  prediction_horizon: 300
  control_horizon: 50

  # ======================================================
  # TIME SCALES (REFACTORED)
  # ======================================================
  dt_model: 0.05        # physics integration step
  dt_mpc: 5.0           # MPC update step (NEW, replaces dt_prediction conceptually)
  dt_control: 60.0      # actuator update step

  # (optional backward compatibility)
  dt_prediction: 5.0    # kept for legacy code compatibility

  # ======================================================
  # PHYSICAL CONSTRAINTS
  # ======================================================
  fuel_min: 2.0
  fuel_max: 5.0

  max_fuel_delta: 0.03  # ton/h per 5s MPC step

  # ======================================================
  # SETPOINTS
  # ======================================================
  Tg_setpoint: 1823.15
  Ts_setpoint: 1723.15

  # ======================================================
  # COST WEIGHTS
  # ======================================================
  w_T: 100.0
  w_F: 10.0
  w_ramp: 1500.0


  # ======================================================
  # MULTI-RATE CONTROL LOGIC
  # ======================================================
  mpc_update_sec: 5.0
  actuator_update_sec: 60.0
  model_dt_sec: 0.05

solver:
  max_iter: 80
  tolerance: 0.001

logging:
  interval_sec: 60